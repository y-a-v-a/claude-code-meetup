<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Keys</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #eee; font-family: monospace; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 12px; opacity: 0.5; pointer-events: none; text-align: center;
    line-height: 1.7; z-index: 10; white-space: nowrap;
  }
  #status {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    font-size: 14px; pointer-events: none; z-index: 10;
  }
  #status.on { color: #0f0; }
  #status.off { color: #f44; }
  kbd { background: #1a1a2a; border: 1px solid #444; border-radius: 3px; padding: 1px 5px; font-size: 11px; }
</style>
</head>
<body>
<div id="status" class="off">press [Z] to start</div>
<div id="hud"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const hudEl = document.getElementById('hud');
let W, H;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// --- Piano key mapping ---
// Bottom row = white keys, top row = black keys (like a real piano)
// Two octaves of chromatic notes
const WHITE_KEYS = ['a','s','d','f','g','h','j','k','l',';'];  // C D E F G A B C D E
const BLACK_KEYS = ['w','e', ,'r','t', ,'y','u', ,'i','o'];    // C# D# . F# G# . A# B# ...
// sparse array: index 2 and 5 and 8 are empty (no black key between E-F and B-C)

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Build key-to-semitone map
const keyMap = {}; // key -> { semitone, isBlack }
// White keys: C D E F G A B C D E = semitones 0 2 4 5 7 9 11 12 14 16
const whiteSemitones = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16];
WHITE_KEYS.forEach((k, i) => { keyMap[k] = { semitone: whiteSemitones[i], isBlack: false }; });
// Black keys: C# D# _ F# G# _ A# _ C# D#
const blackSemitones = [1, 3, -1, 6, 8, -1, 10, 13, -1, 15, 17];
BLACK_KEYS.forEach((k, i) => {
  if (k && blackSemitones[i] >= 0) keyMap[k] = { semitone: blackSemitones[i], isBlack: true };
});

// --- Audio ---
let audioCtx, masterGain, delayNode, delayGain, feedbackGain, analyser, analyserData;
let masterOn = false;
let octave = 4;    // base octave
let waveIdx = 0;
const WAVES = ['sine', 'triangle', 'sawtooth', 'square'];
const WAVE_NAMES = ['sine', 'tri', 'saw', 'square'];
const activeNotes = {}; // key -> { osc, gain }

function initAudio() {
  audioCtx = new AudioContext();
  audioCtx.resume();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;

  // Delay effect chain
  delayNode = audioCtx.createDelay(1.0);
  delayNode.delayTime.value = 0.3;
  feedbackGain = audioCtx.createGain();
  feedbackGain.gain.value = 0.4;
  delayGain = audioCtx.createGain();
  delayGain.gain.value = 0.3;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyserData = new Uint8Array(analyser.frequencyBinCount);

  // Dry path
  masterGain.connect(analyser);
  // Wet path: master -> delay -> delayGain -> analyser, delay -> feedback -> delay
  masterGain.connect(delayNode);
  delayNode.connect(feedbackGain);
  feedbackGain.connect(delayNode); // feedback loop
  delayNode.connect(delayGain);
  delayGain.connect(analyser);

  analyser.connect(audioCtx.destination);
}

function noteFreq(semitone) {
  // A4 = 440Hz, semitone 9 in octave 4
  const midiNote = (octave * 12) + semitone;
  return 440 * Math.pow(2, (midiNote - 69) / 12);
}

function noteOn(key) {
  if (activeNotes[key]) return;
  const info = keyMap[key];
  if (!info) return;

  const freq = noteFreq(info.semitone);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = WAVES[waveIdx];
  osc.frequency.value = freq;

  // Slight random detune for warmth
  osc.detune.value = (Math.random() - 0.5) * 8;

  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02); // fast attack

  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();

  activeNotes[key] = { osc, gain, freq, info };

  // Spawn visual ripple
  spawnRipple(key, info, freq);
}

function noteOff(key) {
  const note = activeNotes[key];
  if (!note) return;

  const t = audioCtx.currentTime;
  note.gain.gain.cancelScheduledValues(t);
  note.gain.gain.setValueAtTime(note.gain.gain.value, t);
  note.gain.gain.linearRampToValueAtTime(0, t + 0.15); // release
  note.osc.stop(t + 0.2);

  delete activeNotes[key];
}

// --- Visuals ---
const ripples = [];
const particles = [];

function spawnRipple(key, info, freq) {
  // Position based on semitone (spread across screen)
  const x = (info.semitone / 17) * W * 0.8 + W * 0.1;
  const y = info.isBlack ? H * 0.35 : H * 0.55;
  const hue = (info.semitone * 30) % 360;

  ripples.push({ x, y, r: 10, hue, alpha: 1, speed: 2 + freq / 400 });

  // Burst of particles
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      hue,
      life: 1,
      size: 2 + Math.random() * 3,
    });
  }
}

function updateHud() {
  const oct = octave;
  hudEl.innerHTML =
    `<kbd>Z</kbd> on/off &nbsp; ` +
    `<kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd><kbd>5</kbd> octave (now: ${oct}) &nbsp; ` +
    `<kbd>Q</kbd> wave: ${WAVE_NAMES[waveIdx]} &nbsp; ` +
    `<kbd>↑</kbd><kbd>↓</kbd> delay<br>` +
    `piano: <kbd>A</kbd>-<kbd>;</kbd> white keys &nbsp; <kbd>W</kbd><kbd>E</kbd><kbd>R</kbd><kbd>T</kbd><kbd>Y</kbd><kbd>U</kbd><kbd>I</kbd><kbd>O</kbd> black keys`;
}

// --- Keyboard ---
addEventListener('keydown', e => {
  if (e.repeat) return;
  const key = e.key.toLowerCase();

  if (key === 'z') {
    if (!audioCtx) initAudio();
    else audioCtx.resume();
    masterOn = !masterOn;
    masterGain.gain.setTargetAtTime(masterOn ? 0.8 : 0, audioCtx.currentTime, 0.02);
    statusEl.className = masterOn ? 'on' : 'off';
    statusEl.textContent = masterOn ? 'ON [Z]' : 'OFF [Z]';
    updateHud();
    return;
  }

  if (!audioCtx || !masterOn) return;

  // Octave select: 1-5
  if (key >= '1' && key <= '5') {
    // Release all current notes before octave change
    Object.keys(activeNotes).forEach(noteOff);
    octave = parseInt(key) + 1; // octaves 2-6
    updateHud();
    return;
  }

  // Wave cycle
  if (key === 'q') {
    waveIdx = (waveIdx + 1) % WAVES.length;
    // Update all active oscillators
    Object.values(activeNotes).forEach(n => { n.osc.type = WAVES[waveIdx]; });
    updateHud();
    return;
  }

  // Delay time: arrow up/down
  if (key === 'arrowup') {
    delayNode.delayTime.value = Math.min(delayNode.delayTime.value + 0.05, 0.8);
    return;
  }
  if (key === 'arrowdown') {
    delayNode.delayTime.value = Math.max(delayNode.delayTime.value - 0.05, 0.05);
    return;
  }

  // Play note
  if (key in keyMap) {
    noteOn(key);
  }
});

addEventListener('keyup', e => {
  const key = e.key.toLowerCase();
  if (key in keyMap) noteOff(key);
});

// --- Draw loop ---
function draw() {
  requestAnimationFrame(draw);

  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Draw piano key hints at rest positions
  const totalKeys = 18;
  for (let s = 0; s <= totalKeys; s++) {
    const x = (s / 17) * W * 0.8 + W * 0.1;
    const isBlack = [1,3,6,8,10,13,15].includes(s);
    const y = isBlack ? H * 0.35 : H * 0.55;

    // Check if this semitone is currently active
    let active = false;
    for (const n of Object.values(activeNotes)) {
      if (n.info.semitone === s) { active = true; break; }
    }

    ctx.beginPath();
    ctx.arc(x, y, active ? 8 : 4, 0, Math.PI * 2);
    const hue = (s * 30) % 360;
    ctx.fillStyle = active
      ? `hsla(${hue}, 100%, 70%, 0.9)`
      : `hsla(${hue}, 50%, 30%, 0.2)`;
    ctx.fill();

    // Note name
    if (!isBlack) {
      ctx.font = '10px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.textAlign = 'center';
      ctx.fillText(NOTE_NAMES[s % 12], x, y + 20);
    }
  }

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.speed;
    rp.alpha -= 0.012;
    if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }

    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${rp.hue}, 100%, 60%, ${rp.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Second ring
    if (rp.r > 20) {
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.r * 0.6, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${rp.hue + 40}, 80%, 50%, ${rp.alpha * 0.5})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life -= 0.015;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.life})`;
    ctx.fill();
  }

  // Waveform across the middle
  if (analyser) {
    analyser.getByteTimeDomainData(analyserData);
    const t = Date.now() / 1000;
    const hue = (t * 30) % 360;

    ctx.strokeStyle = `hsla(${hue}, 70%, 50%, 0.4)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();

    const sliceW = W / analyserData.length;
    for (let i = 0; i < analyserData.length; i++) {
      const v = (analyserData[i] / 128.0 - 1);
      const x = i * sliceW;
      const y = H * 0.5 + v * H * 0.2;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Subtle frequency bars along the bottom
    analyser.getByteFrequencyData(analyserData);
    const barCount = 64;
    const barW = (W / barCount) - 1;
    for (let i = 0; i < barCount; i++) {
      const barH = analyserData[i] * (H / 600);
      ctx.fillStyle = `hsla(${(i * 5 + t * 20) % 360}, 70%, 45%, 0.4)`;
      ctx.fillRect(i * (barW + 1), H - barH, barW, barH);
    }
  }
}
draw();
updateHud();
</script>
</body>
</html>
