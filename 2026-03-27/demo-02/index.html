<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebGPU Particle Compute Shader</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #fallback { color: #fff; font-family: monospace; padding: 2rem; display: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="fallback">WebGPU is not supported in this browser. Try Chrome 113+ or Edge 113+.</div>
<script type="module">

const NUM_PARTICLES = 100000;
const WORKGROUP_SIZE = 256;

async function main() {
  if (!navigator.gpu) {
    document.getElementById('fallback').style.display = 'block';
    document.getElementById('canvas').style.display = 'none';
    return;
  }

  const adapter = await navigator.gpu.requestAdapter();
  const device = await adapter.requestDevice();
  const canvas = document.getElementById('canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const context = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();
  context.configure({ device, format, alphaMode: 'premultiplied' });

  // --- Mouse state ---
  const mouse = new Float32Array([0, 0]);
  canvas.addEventListener('mousemove', e => {
    mouse[0] = (e.clientX / canvas.width) * 2 - 1;
    mouse[1] = -((e.clientY / canvas.height) * 2 - 1);
  });

  // --- Initialize particle data: [posX, posY, velX, velY] per particle ---
  const initialData = new Float32Array(NUM_PARTICLES * 4);
  for (let i = 0; i < NUM_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.sqrt(Math.random()) * 1.0;
    initialData[i * 4 + 0] = Math.cos(angle) * r;
    initialData[i * 4 + 1] = Math.sin(angle) * r;
    initialData[i * 4 + 2] = (Math.random() - 0.5) * 0.002;
    initialData[i * 4 + 3] = (Math.random() - 0.5) * 0.002;
  }

  const particleBuffer = device.createBuffer({
    size: initialData.byteLength,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
  });
  device.queue.writeBuffer(particleBuffer, 0, initialData);

  // --- Uniform buffer for mouse + deltaTime ---
  const uniformBuffer = device.createBuffer({
    size: 16, // vec2 mouse + f32 dt + f32 padding
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  // --- Compute shader ---
  const computeShader = device.createShaderModule({ code: `
    struct Params {
      mouse: vec2f,
      dt: f32,
    };

    struct Particle {
      pos: vec2f,
      vel: vec2f,
    };

    @group(0) @binding(0) var<uniform> params: Params;
    @group(0) @binding(1) var<storage, read_write> particles: array<Particle>;

    // Pseudo-random hash functions
    fn hash(n: f32) -> f32 {
      return fract(sin(n) * 43758.5453123);
    }
    fn hash2(p: vec2f) -> vec2f {
      return vec2f(
        fract(sin(dot(p, vec2f(127.1, 311.7))) * 43758.5453),
        fract(sin(dot(p, vec2f(269.5, 183.3))) * 43758.5453)
      );
    }

    @compute @workgroup_size(${WORKGROUP_SIZE})
    fn main(@builtin(global_invocation_id) id: vec3u) {
      let i = id.x;
      if (i >= ${NUM_PARTICLES}u) { return; }

      var p = particles[i];

      // Per-particle traits from hash
      let h = hash(f32(i) * 1.17);
      let h2 = hash(f32(i) * 3.91);
      let h3 = hash(f32(i) * 7.23);

      // Vector toward mouse
      let toMouse = params.mouse - p.pos;
      let dist = max(length(toMouse), 0.001);
      let dir = toMouse / dist;

      // Gravity-like attraction: strong when far, gentle when close
      let attraction = dir * 0.4 * params.dt / (0.05 + dist);

      // Tangential swirl — mixed directions for chaos
      let tangent = vec2f(-dir.y, dir.x);
      let swirlDir = select(-1.0, 1.0, h2 > 0.4); // ~60% one way, ~40% the other
      let swirlStrength = (0.1 + h * 0.3) * params.dt;
      let swirl = tangent * swirlDir * swirlStrength / (0.1 + dist * 0.5);

      // Time-varying noise/turbulence per particle
      let t = params.dt * 0.01 + f32(i) * 0.001; // slowly evolving seed
      let noiseInput = p.pos * 3.0 + vec2f(sin(t * 174.3), cos(t * 239.7));
      let noise = (hash2(noiseInput) - vec2f(0.5)) * 0.15 * params.dt;

      // Pressure repulsion — grows as particles get closer than their preferred radius
      let preferredDist = 0.05 + h * 0.35; // spread: each particle wants to be at a different distance
      let pressure = -dir * max(preferredDist - dist, 0.0) * 1.5 * params.dt;

      // Apply forces with lighter damping
      p.vel = p.vel * 0.992 + attraction + swirl + noise + pressure;

      // Clamp speed
      let speed = length(p.vel);
      let maxSpeed = 0.015 + h3 * 0.015;
      if (speed > maxSpeed) {
        p.vel = (p.vel / speed) * maxSpeed;
      }

      p.pos = p.pos + p.vel;

      // Soft boundary wrap
      if (p.pos.x < -1.3) { p.pos.x = 1.3; }
      if (p.pos.x >  1.3) { p.pos.x = -1.3; }
      if (p.pos.y < -1.3) { p.pos.y = 1.3; }
      if (p.pos.y >  1.3) { p.pos.y = -1.3; }

      particles[i] = p;
    }
  `});

  const computePipeline = device.createComputePipeline({
    layout: 'auto',
    compute: { module: computeShader, entryPoint: 'main' },
  });

  const computeBindGroup = device.createBindGroup({
    layout: computePipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: uniformBuffer } },
      { binding: 1, resource: { buffer: particleBuffer } },
    ],
  });

  // --- Render shader ---
  const renderShader = device.createShaderModule({ code: `
    struct VSOut {
      @builtin(position) pos: vec4f,
      @location(0) alpha: f32,
    };

    @vertex
    fn vs(@location(0) particlePos: vec2f, @location(1) particleVel: vec2f) -> VSOut {
      var out: VSOut;
      let aspect = ${(canvas.width / canvas.height).toFixed(4)};
      var adjusted = particlePos;
      adjusted.x = adjusted.x / aspect;
      out.pos = vec4f(adjusted, 0.0, 1.0);
      out.alpha = clamp(length(particleVel) * 30.0, 0.15, 1.0);
      return out;
    }

    @fragment
    fn fs(@location(0) alpha: f32) -> @location(0) vec4f {
      // Cyan-ish glow
      return vec4f(0.3 * alpha, 0.85 * alpha, 1.0 * alpha, alpha);
    }
  `});

  const renderPipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: {
      module: renderShader,
      entryPoint: 'vs',
      buffers: [{
        arrayStride: 16,
        attributes: [
          { shaderLocation: 0, offset: 0, format: 'float32x2' },  // pos
          { shaderLocation: 1, offset: 8, format: 'float32x2' },  // vel
        ],
      }],
    },
    fragment: {
      module: renderShader,
      entryPoint: 'fs',
      targets: [{
        format,
        blend: {
          color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
          alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' },
        },
      }],
    },
    primitive: { topology: 'point-list' },
  });

  // --- Frame loop ---
  let lastTime = performance.now();
  const workgroupCount = Math.ceil(NUM_PARTICLES / WORKGROUP_SIZE);

  function frame() {
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    // Upload uniforms
    const uniformData = new Float32Array([mouse[0], mouse[1], dt, 0]);
    device.queue.writeBuffer(uniformBuffer, 0, uniformData);

    const encoder = device.createCommandEncoder();

    // Compute pass
    const computePass = encoder.beginComputePass();
    computePass.setPipeline(computePipeline);
    computePass.setBindGroup(0, computeBindGroup);
    computePass.dispatchWorkgroups(workgroupCount);
    computePass.end();

    // Render pass
    const textureView = context.getCurrentTexture().createView();
    const renderPass = encoder.beginRenderPass({
      colorAttachments: [{
        view: textureView,
        clearValue: { r: 0.0, g: 0.0, b: 0.02, a: 1.0 },
        loadOp: 'clear',
        storeOp: 'store',
      }],
    });
    renderPass.setPipeline(renderPipeline);
    renderPass.setVertexBuffer(0, particleBuffer);
    renderPass.draw(NUM_PARTICLES);
    renderPass.end();

    device.queue.submit([encoder.finish()]);
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  // Handle resize
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    context.configure({ device, format, alphaMode: 'premultiplied' });
  });
}

main();
</script>
</body>
</html>
