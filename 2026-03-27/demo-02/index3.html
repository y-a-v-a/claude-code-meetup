<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synth Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }
  canvas { display: block; cursor: crosshair; }
  #info {
    position: fixed; top: 12px; left: 12px;
    font-size: 14px; opacity: 0.6; pointer-events: none;
  }
  #controls {
    position: fixed; bottom: 12px; left: 12px;
    display: flex; gap: 8px;
  }
  #controls button {
    background: #222; color: #0ff; border: 1px solid #0ff;
    padding: 6px 14px; font-family: monospace; font-size: 13px;
    cursor: pointer; border-radius: 4px;
  }
  #controls button.active { background: #0ff; color: #111; }
</style>
</head>
<body>
<div id="info">click & drag to play — X = pitch, Y = volume</div>
<canvas id="c"></canvas>
<div id="controls">
  <button class="active" data-wave="sine">sine</button>
  <button data-wave="square">square</button>
  <button data-wave="sawtooth">saw</button>
  <button data-wave="triangle">tri</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// --- Web Audio setup ---
let audioCtx, osc, gain, analyser, dataArray;
let playing = false;
let waveType = 'sine';

function startAudio() {
  audioCtx = new AudioContext();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  osc.type = waveType;
  osc.frequency.value = 440;
  gain.gain.value = 0;

  osc.connect(gain);
  gain.connect(analyser);
  analyser.connect(audioCtx.destination);
  osc.start();
  playing = true;
}

function setFreqAndGain(x, y) {
  if (!audioCtx) return;
  // X maps to frequency: 80 Hz – 2000 Hz (exponential)
  const ratio = x / W;
  const freq = 80 * Math.pow(25, ratio);
  osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.01);

  // Y maps to volume: top = loud, bottom = quiet
  const vol = 1 - (y / H);
  gain.gain.setTargetAtTime(vol * 0.5, audioCtx.currentTime, 0.01);
}

// --- Mouse / touch interaction ---
let isDown = false;

canvas.addEventListener('mousedown', e => {
  if (!audioCtx) startAudio();
  isDown = true;
  setFreqAndGain(e.clientX, e.clientY);
  gain.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.01);
});

canvas.addEventListener('mousemove', e => {
  if (!isDown) return;
  setFreqAndGain(e.clientX, e.clientY);
});

canvas.addEventListener('mouseup', () => {
  isDown = false;
  if (gain) gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!audioCtx) startAudio();
  isDown = true;
  const t = e.touches[0];
  setFreqAndGain(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  setFreqAndGain(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isDown = false;
  if (gain) gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
});

// --- Waveform buttons ---
document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('#controls .active')?.classList.remove('active');
    btn.classList.add('active');
    waveType = btn.dataset.wave;
    if (osc) osc.type = waveType;
  });
});

// --- Visualizer ---
let hue = 180;

function draw() {
  requestAnimationFrame(draw);

  // Fade trail
  ctx.fillStyle = 'rgba(17, 17, 17, 0.15)';
  ctx.fillRect(0, 0, W, H);

  if (!analyser) return;

  analyser.getByteTimeDomainData(dataArray);

  hue = (hue + 0.3) % 360;
  ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
  ctx.lineWidth = 2;
  ctx.beginPath();

  const sliceWidth = W / dataArray.length;
  let x = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128.0;
    const y = (v * H) / 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();

  // Draw frequency bar sparkle when playing
  if (isDown) {
    analyser.getByteFrequencyData(dataArray);
    const barW = (W / 64) - 1;
    for (let i = 0; i < 64; i++) {
      const barH = dataArray[i] * (H / 512);
      ctx.fillStyle = `hsl(${hue + i * 4}, 80%, 50%)`;
      ctx.fillRect(i * (barW + 1), H - barH, barW, barH);
    }
  }
}
draw();
</script>
</body>
</html>
